name: Build with MSVC

on:
  workflow_call:
    inputs:
      build-dir:
        required: true
        type: string
      version-str:
        required: true
        type: string
      coverage-threshold:
        required: false
        type: string
        default: '0'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S src -B ${{ inputs['build-dir'] }}-${{ matrix.arch }} `
          -G "Visual Studio 17 2022" `
          -A ${{ matrix.arch }} `
          -DPROJECT_VERSION="${{ inputs['version-str'] }}"

      - name: Build
        run: cmake --build ${{ inputs['build-dir'] }}-${{ matrix.arch }} --config RelWithDebInfo

      - name: Run tests
        run: ctest --test-dir ${{ inputs['build-dir'] }}-${{ matrix.arch }} -C RelWithDebInfo --output-on-failure

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs['build-dir'] }}-${{ matrix.arch }}
          path: |
            ${{ inputs['build-dir'] }}-${{ matrix.arch }}/RelWithDebInfo/*.exe
            ${{ inputs['build-dir'] }}-${{ matrix.arch }}/RelWithDebInfo/*.pdb

      - name: Run code coverage
        if: matrix.arch == 'x64'
        run: |
          choco install opencppcoverage -y --no-progress
          & "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe" `
            --sources ${{ github.workspace }}\src `
            --export_type cobertura:coverage.xml `
            --export_type html:coverage_report `
            --threshold ${{ inputs['coverage-threshold'] }} `
            -- `
            ${{ inputs['build-dir'] }}-${{ matrix.arch }}\RelWithDebInfo\tests.exe

      - name: Upload coverage reports
        if: matrix.arch == 'x64' && (success() || failure())
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage_report
