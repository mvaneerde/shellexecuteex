name: Build with MSVC

on:
  workflow_call:
    inputs:
      build-dir:
        required: true
        type: string
      version-str:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -S src -B ${{ inputs['build-dir'] }}-${{ matrix.arch }} `
            -G "Visual Studio 17 2022" `
            -A ${{ matrix.arch }} `
            -DPROJECT_VERSION="${{ inputs['version-str'] }}"

      - name: Build
        run: |
          cmake --build ${{ inputs['build-dir'] }}-${{ matrix.arch }} `
            --config RelWithDebInfo

      - name: Run tests
        run: |
          ctest --test-dir ${{ inputs['build-dir'] }}-${{ matrix.arch }} `
            -C RelWithDebInfo `
            --output-on-failure

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs['build-dir'] }}-${{ matrix.arch }}
          path: |
            ${{ inputs['build-dir'] }}-${{ matrix.arch }}/RelWithDebInfo/*.exe
            ${{ inputs['build-dir'] }}-${{ matrix.arch }}/RelWithDebInfo/*.pdb

  sign:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs['build-dir'] }}-*
          path: artifacts
          merge-multiple: true

      - name: Sign executables
        uses: ebuckmaster/code-sign-with-signtool@v1
        with:
          certificate: ${{ secrets.SIGNING_CERT_BASE64 }}
          cert-password: ${{ secrets.SIGNING_CERT_PASSWORD }}
          folder: artifacts

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-binaries
          path: artifacts
