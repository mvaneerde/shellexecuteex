name: Build with MSVC

on:
  workflow_call:
    inputs:
      build-dir:
        required: true
        type: string
      version-str:
        required: true
        type: string
      coverage-threshold:
        required: false
        type: string
        default: '0'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            config: RelWithDebInfo
          - os: windows-11-arm
            arch: arm64
            config: RelWithDebInfo
          - os: windows-latest
            arch: x64
            config: Debug
            is-coverage: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S src -B ${{ inputs['build-dir'] }}-${{ matrix.arch }} `
          -G "Visual Studio 17 2022" `
          -A ${{ matrix.arch }} `
          -DPROJECT_VERSION="${{ inputs['version-str'] }}"

      - name: Build
        run: cmake --build ${{ inputs['build-dir'] }}-${{ matrix.arch }} --config ${{ matrix.config }}

      - name: Run tests
        run: ctest --test-dir ${{ inputs['build-dir'] }}-${{ matrix.arch }} -C ${{ matrix.config }} --output-on-failure

      - name: Upload binaries
        if: "!matrix.is-coverage"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs['build-dir'] }}-${{ matrix.arch }}
          path: |
            ${{ inputs['build-dir'] }}-${{ matrix.arch }}/${{ matrix.config }}/*.exe
            ${{ inputs['build-dir'] }}-${{ matrix.arch }}/${{ matrix.config }}/*.pdb

      - name: Install code coverage tools
        if: matrix.is-coverage
        run: |
          choco install opencppcoverage -y --no-progress
          
      - name: Run code coverage
        if: matrix.is-coverage
        run: |
          $report_dir = Join-Path "${{ runner.temp }}" "coverage"
          scripts\code-coverage.ps1 `
            --build_dir "${{ inputs['build-dir'] }}-${{ matrix.arch }}" `
            --report_dir $report_dir `
            --source_dir "${{ github.workspace }}\src" `
            --config "${{ matrix.config }}"

          [xml]$xml = Get-Content (Join-Path $report_dir "coverage.xml") -Raw
          $linesValid = [int]$xml.coverage.'lines-valid'
          if ($linesValid -eq 0) {
              Write-Error "No modules or source files were instrumented. Verify that your test executables are being built and that PDB files are present."
              exit 1
          }

          $percent = ([float]$xml.coverage.'line-rate') * 100
          $threshold = [float]${{ inputs['coverage-threshold'] }}

          Write-Host ("Code Coverage: {0:G6}% (Threshold: {1:G6}%)" -f $percent, $threshold)
          if ($percent -lt $threshold) {
              Write-Error ("Code coverage ({0:G6}%) is below the required threshold ({1:G6}%)" -f $percent, $threshold)
              exit 1
          }

      - name: Upload coverage reports
        if: matrix.is-coverage && (success() || failure())
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ runner.temp }}\coverage
