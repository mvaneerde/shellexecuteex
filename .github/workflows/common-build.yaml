name: Build with MSVC

on:
  workflow_call:
    inputs:
      build-dir:
        required: true
        type: string
      version-str:
        required: true
        type: string

jobs:
  test-secret:
    runs-on: windows-latest
    steps:
      - name: Check secret
        run: |
          Write-Host "TEST_SECRET = ${{ secrets.TEST_SECRET }}"
          exit 1

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -S src -B ${{ inputs['build-dir'] }}-${{ matrix.arch }} `
            -G "Visual Studio 17 2022" `
            -A ${{ matrix.arch }} `
            -DPROJECT_VERSION="${{ inputs['version-str'] }}"

      - name: Build
        run: |
          cmake --build ${{ inputs['build-dir'] }}-${{ matrix.arch }} `
            --config RelWithDebInfo

      - name: Run tests
        run: |
          ctest --test-dir ${{ inputs['build-dir'] }}-${{ matrix.arch }} `
            -C RelWithDebInfo `
            --output-on-failure

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs['build-dir'] }}-${{ matrix.arch }}
          path: |
            ${{ inputs['build-dir'] }}-${{ matrix.arch }}/RelWithDebInfo/*.exe
            ${{ inputs['build-dir'] }}-${{ matrix.arch }}/RelWithDebInfo/*.pdb

  sign:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs['build-dir'] }}-*
          path: artifacts
          merge-multiple: true

      - name: Decode certificate
        run: |
          $certPath = "$env:RUNNER_TEMP\cert.pfx"
          $base64Cert = "${{ secrets.SIGNING_CERT_BASE64 }}"
          
          if ([string]::IsNullOrWhiteSpace($base64Cert)) {
            Write-Error "SIGNING_CERT_BASE64 secret is empty!"
            exit 1
          }
          
          Write-Host "Base64 string length: $($base64Cert.Length)"
          
          try {
            $certData = [Convert]::FromBase64String($base64Cert)
            Write-Host "Decoded bytes: $($certData.Length)"
            
            if ($certData.Length -eq 0) {
              Write-Error "Base64 decoded to 0 bytes - invalid certificate format"
              exit 1
            }
            
            [IO.File]::WriteAllBytes($certPath, $certData)
            $fileSize = (Get-Item $certPath).Length
            Write-Host "Certificate written successfully: $fileSize bytes"
          } catch {
            Write-Error "Failed to decode certificate: $_"
            exit 1
          }

      - name: Sign executables
        run: |
          $signtoolPath = "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe"
          $certPath = "$env:RUNNER_TEMP\cert.pfx"
          $certPassword = "${{ secrets.SIGNING_CERT_PASSWORD }}"
          
          if (-not (Test-Path $signtoolPath)) {
            Write-Host "signtool not found at standard location, searching..."
            $signtoolPath = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          
          if (-not (Test-Path $certPath)) {
            Write-Error "Certificate file not found at $certPath"
            exit 1
          }
          
          Write-Host "Using signtool: $signtoolPath"
          Write-Host "Signing executables..."
          
          Get-ChildItem artifacts -Recurse -Filter *.exe | ForEach-Object {
            Write-Host "Signing: $($_.FullName)"
            & $signtoolPath sign `
              /f $certPath `
              /p $certPassword `
              /tr "http://timestamp.digicert.com" `
              /td sha256 `
              /fd sha256 `
              $_.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Signing failed for $($_.FullName) with exit code $LASTEXITCODE"
              exit 1
            }
          }

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-binaries
          path: artifacts
