name: Create release after successful merge

on:
  push:
    branches: [ main ]

jobs:
  build:
    uses: ./.github/workflows/common-build.yaml
    with:
      build-dir: main-build

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: main-build-x64
          path: build-x64

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: main-build-ARM64
          path: build-ARM64

      - name: Zip release
        run: |
          mkdir -p release
          cp build-x64/* release/
          cp build-ARM64/* release/
          zip -r release/ShellExecuteEx-${{ github.run_number }}.zip release/*

      - name: Create GitHub release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version tag
        id: next_version
        run: |
          git -fetch --tags
          LATEST_TAG=$(git --describe --tags --abbrev=0)
          VERSION=$(LATEST_TAG#v)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEXT_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "NEXT_TAG=$NEXT_TAG" >> $GITHUB_ENV
          echo "Next tag will be $NEXT_TAG"

      - name: Create next version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEXT_TAG
          git push origin $NEXT_TAG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
