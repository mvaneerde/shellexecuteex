name: Create release after successful merge

on:
  push:
    branches: [ main ]

jobs:
  version:
    name: Increment version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calc
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
          NEXT_TAG="v$NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT

  build:
    name: Build official output
    needs: version
    uses: ./.github/workflows/common-build.yaml
    with:
      build-dir: main-build
      version-str: ${{ needs.version.outputs.version }}

  release:
    needs: [version, build]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: main-build-x64
          path: build-x64

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: main-build-arm64
          path: build-arm64

      - name: Verify artifacts contain executables
        shell: pwsh
        run: |
          $artifacts = @("build-x64", "build-arm64")
          $artifacts | ForEach-Object {
            $artifact = $_
            $exeCount = @(Get-ChildItem -Path $artifact -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue).Count
            Write-Output "$artifact executables found: $exeCount"
            if ($exeCount -ne 2) {
              throw "Expected 2 .exe files in $artifact but found $exeCount"
            }
          }

      - name: Import signing certificate
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.SIGN_CERT_PFX }}")
          [IO.File]::WriteAllBytes("cert.pfx", $certBytes)

      - name: Sign executables
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1

          $artifacts = @("build-x64", "build-arm64")
          $artifacts | ForEach-Object {
            $exeFiles = @(
              Get-ChildItem -Path $artifact -Filter "*.exe" -Recurse
            )
            
            foreach ($exe in $exeFiles) {
              Write-Output "Signing $($exe.FullName)"
              & $signtool.FulllName sign `
                /f cert.pfx `
                /p "${{ secrets.SIGN_CERT_PASSWORD }}" `
                /t "http://timestamp.sectigo.com" `
                /fd SHA256 `
                "$($exe.FullName)"
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to sign $($exe.FullName)"
              }
            }
          }

      - name: Clean up certificate
        shell: pwsh
        if: always()
        run: Remove-Item "cert.pfx" -Force -ErrorAction SilentlyContinue

      - name: Prepare release package
        shell: pwsh
        run: |
          $releaseDir = "release"
          $packageDir = Join-Path $releaseDir "ShellExecuteEx"
          
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          $artifacts = @("x64", "arm64")
          $artifacts | ForEach-Object {
            Copy-Item `
              -Path "build-$artifact\*" `
              -Destination (Join-Path $packageDir $artifact) `
              -Recurse
          }
              
          $zipPath = Join-Path $releaseDir "ShellExecuteEx-${{ needs.version.outputs.version }}.zip"
          Compress-Archive -Path $packageDir -DestinationPath $zipPath -Force

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.version.outputs.tag }}
          git push origin ${{ needs.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          name: Release ${{ needs.version.outputs.version }}
          tag_name: ${{ needs.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
