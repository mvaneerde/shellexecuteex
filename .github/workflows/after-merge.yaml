name: Create release after successful merge

on:
  push:
    branches: [ main ]

jobs:
  version:
    name: Increment version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calc
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
          NEXT_TAG="v$NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT

  build:
    name: Build official output
    needs: version
    uses: ./.github/workflows/common-build.yaml
    with:
      build-dir: main-build
      version-str: ${{ needs.version.outputs.version }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: main-build-x64
          path: build-x64

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: main-build-arm64
          path: build-arm64

      - name: Zip release
        run: |
          mkdir -p release
          cp build-x64/* release/
          cp build-arm64/* release/
          zip -r release/ShellExecuteEx-${{ github.run_number }}.zip release/*

      - name: Create GitHub release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-tag:
    name: Create tag
    runs-on: ubuntu-latest
    needs: [version, release]
    steps:
      - name: Set version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.version.outputs.NEXT_TAG }}
          git push origin ${{ needs.version.outputs.NEXT_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
